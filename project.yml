name: HermesMonitor
options:
  bundleIdPrefix: com.heavry
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

targets:
  HermesMonitor:
    type: application
    platform: macOS
    sources:
      - path: HermesMonitor
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.heavry.hermes-monitor
        PRODUCT_NAME: Hermes Monitor
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        INFOPLIST_KEY_LSUIElement: YES
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: HermesMonitor/Info.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: "Hermes Monitor"
        CFBundleShortVersionString: "1.0.0"
